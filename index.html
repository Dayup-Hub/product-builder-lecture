<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>로또 번호 추첨기</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
                <span class="icon">🌙</span>
            </button>
        </header>
        <main>
            <div class="lotto-display">
                <div id="lotto-numbers" class="lotto-numbers"></div>
            </div>
            <button id="generate-btn" class="generate-btn">번호 생성</button>
        </main>
    </div>

    <div class="container form-container">
        <h2 class="form-title">제휴 문의</h2>
        <form action="https://formspree.io/f/xdalvdqd" method="POST" id="contact-form">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="4" placeholder="제휴 관련 문의 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="generate-btn submit-btn">문의 보내기</button>
        </form>
        <p id="form-success" class="form-success hidden">문의가 성공적으로 전송됐습니다! 빠르게 답변드릴게요.</p>
    </div>

    <div class="container disqus-container">
        <div id="disqus_thread"></div>
        <script>
            var disqus_config = function () {
                this.page.url = 'https://product-builder-lecture-ebh.pages.dev/';
                this.page.identifier = 'lotto-main';
            };
            (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-viqfpaiple.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script src="main.js"></script>
</body>
</html>
